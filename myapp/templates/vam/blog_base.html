{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Blog</title>
<link href="{% static 'vam/vam.css' %}" rel='stylesheet' type="text/css" />
<script src="//ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
<script src="{% static 'blog/exif.js' %}" type="text/javascript"></script>
<script src="{% static 'tinymce/tinymce.min.js' %}"  type="text/javascript"></script>
<!-- ---------------------------------------- -->
</head>
<body>
{% block top %}
{% endblock %}
<div id="container">
<div id="top" align="center">
{% block menu %}
{% endblock %}
</div>
<div id="leftnav">
{% block left %}
{% endblock %}
</div>
<div id="content">
{% block corps %}
{% endblock %}
</div>
<div id="footer">
{% block footer %}
{% endblock %}
</div>
</div>
<!-- ------------------------------------------ -->
<script type="text/javascript">
document.getElementById('mydoc').addEventListener('change', function(e) {
	if (e.target.files[0]) {
		go_imgload();	
	  	//<document.body.append('You selected ' + e.target.files[0].name);
	}
  })
function go_imgload() {
	document.getElementById("myform").code_action.value ="imgload";
	document.getElementById("myform").submit();
	return true;
}
function go_register() {
	document.getElementById("myform").code_action.value ="register";
	document.getElementById("myform").submit();
	return true;
}
tinymce.init({
    selector: '#wysiwyg',
	width : 640,
	themes: 'modern',
	menubar : false,
	statusbar : false,
	convert_urls : false,
	plugins: 'image link code',
	toolbar: 'undo redo | cut copy paste | bold italic | alignleft aligncenter alignright | link image | code',
});
</script>
</body>
</html>
